name: self-check

# Drift guard for the cost-estimate skill (the achievable form of P0-9): the report is
# LLM-generated and cannot be byte-regenerated by CI, but the deterministic machinery and
# sample consistency are checked — bash-block syntax, nondeterminism/network audit, Monte-Carlo
# reproducibility, the structural-FP archetype gate, fixture-LOC vs sample, and sample freshness.

on:
  push:
    paths: ['skill/**', 'examples/**', 'scripts/**', '.github/workflows/self-check.yml']
  pull_request:
    paths: ['skill/**', 'examples/**', 'scripts/**', '.github/workflows/self-check.yml']
  workflow_dispatch:

jobs:
  self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cloc + jq (optional deps; the script degrades gracefully without them)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cloc jq
      - name: Run skill self-check
        run: bash scripts/self-check.sh
